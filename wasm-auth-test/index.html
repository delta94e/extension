<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wasm Auth Test</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 300px; text-align: center; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #0f3460; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 10px; background: #e94560; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 15px; }
    button:hover { background: #d63d56; }
    #result { padding: 10px; font-weight: bold; border-radius: 6px; }
    .success { background: #198754; color: white; }
    .error { background: #dc3545; color: white; }
  </style>
</head>
<body>
  <div class="box">
    <h2>WebAssembly Security</h2>
    <p style="font-size: 13px; color: #a9a9a9;">Thử nhập sai và nhập đúng "1905@DEV"</p>
    <input type="password" id="pwd" placeholder="Nhập mật khẩu...">
    <button id="btn">Đăng nhập (Wasm)</button>
    <div id="result" style="display: none;"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
